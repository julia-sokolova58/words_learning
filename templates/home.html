{% extends "base.html" %}
{% load django_bootstrap5 %}

{% block title %}Поиск отрывка{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h1 class="mb-4">Поиск отрывка в книге</h1>
        <p class="text-muted mb-4">
            Введите первые 5 и последние 5 слов отрывка из книги "Amokläufer" Штефана Цвейга.
        </p>
        
        <div class="card">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {% bootstrap_form form %}
                    <button type="submit" class="btn btn-primary">Найти слова</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
